name: kayip_dosyalar
description: Kayıp Dosyalar - JSON driven detective story engine.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - data/episode_index.json
    - data/episodes/dosya_01/manifest.json
    - data/episodes/dosya_01/story.json
    - data/episodes/dosya_02_ikinci_kutu/manifest.json
    - data/episodes/dosya_02_ikinci_kutu/story.json
    - assets/episodes/dosya_01/cover.webp
